name: Compile CV PDF

on:
  push:
    branches: [main]

jobs:
  compile:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: typst-community/setup-typst@v4

      - name: Compile CV PDF
        run: typst compile main.typ cv.pdf --font-path ./fonts/

      - name: Compile Cover Letters
        run: |
          for f in letters/*.toml; do
            company=$(basename "$f" .toml)
            echo "Compiling cover letter for $company..."
            typst compile --input company="$company" --font-path ./fonts/ compile_letters.typ "letter_$company.pdf"
          done

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest CV and Letters
          make_latest: true
          files: |
            cv.pdf
            letter_*.pdf
