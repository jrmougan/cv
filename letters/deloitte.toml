[shared]
to = "Departamento de Selección\nDeloitte Digital"

[es]
date = "6 de mayo de 2026"
subject = "Candidatura para el puesto de Desarrollador Frontend"
opening = "Estimado equipo de selección de Deloitte Digital:"
body = """
Me dirijo a vosotros como Desarrollador Frontend con interés en incorporarme a Deloitte Digital. Lo que más me atrae específicamente es trabajar en proyectos de transformación con clientes que están explorando seriamente el impacto de la IA en cómo se construye software — un terreno en el que ya estoy invirtiendo tiempo.

En EMAIS Grupo, además del trabajo de producto en React y TypeScript dentro de un equipo de +7 desarrolladores con Scrum, formo parte de un piloto interno bastante real: estamos integrando flujos de desarrollo asistidos por IA en el día a día —Copilot, Claude, OpenCode— y experimentando con ingeniería agéntica en tareas de desarrollo, refactor y revisión. No es un experimento aislado: estamos midiendo qué partes del ciclo se aceleran de verdad, dónde se rompe la calidad y qué es realmente útil en producción. Es algo poco habitual en una empresa de gestión empresarial española y, para mí, una de las áreas más interesantes en las que invertir tiempo ahora mismo.

Antes, en el CiTIUS (USC), construí desde cero como único frontend developer la herramienta LexGal: arquitectura React, sistema de versionado sobre documentos XML, edición colaborativa en tiempo real con WebSockets, y comunicación directa con los investigadores del centro para sacar requisitos. Eso me dio el bagaje de pensar en producto entero, no solo en tareas.

Os escribo porque la consultoría es donde estos flujos se aplican a problemas reales y diversos, y me interesa formar parte del equipo que los esté llevando a cliente. Estaré encantado de comentar cualquier detalle.
"""
closing = "Atentamente,"

[en]
date = "May 6, 2026"
subject = "Application for Frontend Developer Position"
opening = "Dear Deloitte Digital Hiring Team,"
body = """
I am writing as a Frontend Developer interested in joining Deloitte Digital. What specifically draws me to your team is working on transformation projects with clients seriously exploring the impact of AI on how software is built — a space I am already investing in.

At EMAIS Grupo, alongside product work in React and TypeScript within a 7+ developer team following Scrum, I am part of a fairly real internal pilot: we are integrating AI-assisted development workflows into our day-to-day —Copilot, Claude, OpenCode— and experimenting with agentic engineering across development, refactor, and review tasks. It is not an isolated experiment: we are measuring which parts of the cycle actually accelerate, where quality breaks down, and what is genuinely useful in production. It is unusual for a Spanish enterprise software company, and for me one of the most interesting areas to invest in right now.

Previously, at CiTIUS (USC), I built LexGal from scratch as the sole frontend developer: React architecture, a version control system over XML documents, real-time collaborative editing via WebSockets, and direct communication with the centre's researchers to define requirements. That gave me the experience of thinking about complete products, not just tasks.

I am writing because consulting is where these workflows get applied to real, diverse problems, and I am interested in joining a team that is taking them to clients. I would be happy to discuss any details.
"""
closing = "Best regards,"
