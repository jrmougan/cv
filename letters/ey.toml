[shared]
to = "Departamento de Selección\nEY / EY GDS"

[es]
date = "6 de mayo de 2026"
subject = "Candidatura para el puesto de Desarrollador Senior Frontend"
opening = "Estimado equipo de selección de EY:"
body = """
Me dirijo a ustedes con el fin de postular al puesto de Desarrollador Senior Frontend en EY.

Cuento con más de cuatro años de experiencia en React y TypeScript, y me atrae especialmente incorporarme a EY por los proyectos internacionales que canalizan a través de sus centros de servicios globales (GDS), un contexto donde el ritmo de cliente, la exigencia técnica y el trabajo distribuido son parte del trabajo y donde quiero llevar mi nivel de inglés (B2) del consumo diario de documentación al uso cotidiano en equipo.

Actualmente, en EMAIS Grupo, formo parte de un equipo de más de siete desarrolladores que combina, bajo Scrum, la entrega continua de funcionalidad nueva con la migración progresiva de módulos legacy de AngularJS + Redux a React con Zustand. El día a día implica componentes funcionales con los últimos hooks, TypeScript/TSX, code review estricto y decisiones de arquitectura pragmáticas para modernizar sin detener el negocio: el mismo equilibrio que requieren los proyectos de cliente que no pueden permitirse una parada. Además, participo en el piloto interno de desarrollo asistido por IA (Copilot, Claude, OpenCode) e ingeniería agéntica.

Antes, durante un año en el CiTIUS (Universidade de Santiago de Compostela), fui el único frontend del proyecto LexGal: definí desde cero la arquitectura React, el sistema de versionado con diff visual sobre JSON parseado sobre un original XML y la edición colaborativa por WebSockets, además de comunicarme directamente con los responsables del proyecto para refinar requisitos (reuniones conjuntas con los responsables de proyecto, investigadores y funcionarios públicos del proyecto LexGal). Esa etapa me dio autonomía técnica de extremo a extremo y experiencia real en interlocución con cliente.

Quedo a su disposición para ampliar cualquier detalle del perfil en una entrevista.
"""
closing = "Un cordial saludo,"

[en]
date = "May 6, 2026"
subject = "Application for Senior Frontend Developer Position"
opening = "Dear EY Hiring Team,"
body = """
I am writing to apply for the Senior Frontend Developer position at EY.

I have more than four years of experience in React and TypeScript, and I am particularly drawn to EY by the international projects channelled through your Global Delivery Services (GDS) centres — a context where client pace, technical demand, and distributed work are part of the job, and where I want to take my English (B2) from daily documentation consumption to everyday team use.

Currently, at EMAIS Grupo, I am part of a team of more than seven developers that combines, under Scrum, continuous delivery of new functionality with the progressive migration of legacy AngularJS + Redux modules to React with Zustand. Day-to-day involves functional components with the latest hooks, TypeScript/TSX, strict code review, and pragmatic architectural decisions to modernise without stopping the business: the same balance required by client projects that cannot afford a pause. I also take part in the internal pilot of AI-assisted development (Copilot, Claude, OpenCode) and agentic engineering.

Previously, for a year at CiTIUS (University of Santiago de Compostela), I was the sole frontend developer on the LexGal project: I defined from scratch the React architecture, the version control system with visual diff over JSON parsed from an XML original, and real-time collaborative editing via WebSockets, in addition to communicating directly with the project leads to refine requirements (joint meetings with project leads, researchers, and public officials of the LexGal project). That stage gave me end-to-end technical autonomy and real experience in client interlocution.

I remain at your disposal to expand on any detail of the profile in an interview.
"""
closing = "Best regards,"
