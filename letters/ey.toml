[shared]
to = "Departamento de Selección\nEY / EY GDS"

[es]
date = "6 de mayo de 2026"
subject = "Candidatura para el puesto de Desarrollador Frontend"
opening = "Estimado equipo de selección de EY:"
body = """
Me dirijo a vosotros para presentar mi candidatura como Desarrollador Frontend en EY. Llego con +4 años haciendo frontend en React y TypeScript en producción, y un motivo concreto detrás de la candidatura: busco un entorno más cambiante que el que tengo ahora, con proyectos variados, ritmo de consultoría y la posibilidad de trabajar en proyectos internacionales. Vuestros centros de servicios globales encajan exactamente con eso.

A nivel técnico, en EMAIS Grupo trabajo dentro de un equipo de +7 desarrolladores con Scrum y code review obligatorio: módulos de negocio en producción, una librería de componentes UI con Storybook, refactor progresivo de AngularJS a React, y un piloto interno de flujos de desarrollo con IA y agéntica. Antes, en el CiTIUS (USC), trabajé un año como único frontend developer en LexGal —arquitectura React desde cero, sistema de versionado con diff sobre XML, edición colaborativa en tiempo real con WebSockets—, lo que me dio bagaje en autonomía y diseño de productos completos.

A nivel de idiomas, mi inglés es B2 y lo uso a diario para documentación técnica y comunicación profesional escrita y oral. Pasarlo al día a día con equipos distribuidos es justamente uno de los pasos que quiero dar ahora.

Estaré encantado de comentar cualquier detalle del perfil.
"""
closing = "Atentamente,"

[en]
date = "May 6, 2026"
subject = "Application for Frontend Developer Position"
opening = "Dear EY Hiring Team,"
body = """
I am writing to present my candidacy as a Frontend Developer at EY. I come with 4+ years building frontend in React and TypeScript in production, and a concrete reason behind the application: I am looking for a more varied environment than the one I have now, with rotating projects, a consulting pace, and the chance to work on international engagements. Your Global Delivery Services centres match that exactly.

Technically, at EMAIS Grupo I work within a 7+ developer team with Scrum and mandatory code review: production business modules, a UI component library with Storybook, progressive refactoring from AngularJS to React, and an internal pilot of AI-assisted and agentic engineering workflows. Previously, at CiTIUS (USC), I worked for a year as the sole frontend developer on the LexGal project —React architecture from scratch, a version control system with diff over XML, real-time collaborative editing via WebSockets—, which gave me a foundation in autonomy and full-product design.

Language-wise, my English is B2 and I use it daily for technical documentation and professional written and spoken communication. Bringing it into day-to-day work with distributed teams is precisely one of the steps I want to take now.

I would be happy to discuss any aspect of the profile.
"""
closing = "Best regards,"
