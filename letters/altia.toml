[shared]
to = "Departamento de Selección\nAltia Consultores"

[es]
date = "6 de mayo de 2026"
subject = "Candidatura para el puesto de Desarrollador Frontend"
opening = "Estimado equipo de selección de Altia:"
body = """
Os escribo como gallego afincado en Santiago de Compostela y con experiencia bastante literal en el tipo de proyectos que lleváis en administración pública gallega.

En el CiTIUS (USC) trabajé un año como único frontend developer en LexGal, una herramienta para importar, editar, versionar y consolidar normativa autonómica gallega en formato XML. Más allá del trabajo técnico —arquitectura React, sistema de versionado con diff visual entre revisiones, edición colaborativa en tiempo real con WebSockets sobre una API REST SpringBoot—, el día a día era hablar directamente con los investigadores del centro para traducir un proceso administrativo concreto en una herramienta usable. Esa combinación de autonomía técnica y conocimiento del dominio es la que más valor creo que puedo aportar a proyectos como los vuestros.

Actualmente, en EMAIS Grupo, complemento ese perfil dentro de un equipo de +7 desarrolladores con Scrum y code review obligatorio: módulos de negocio en producción con React y TypeScript, una librería de componentes UI en Storybook construida con UX/UI, refactor progresivo de AngularJS a React, y un piloto interno de flujos de desarrollo con IA y agéntica.

Trabajar en una empresa gallega de referencia con proyectos de envergadura nacional, sin tener que mudarme, es honestamente lo que más me motiva. Estaré encantado de comentar cualquier detalle.
"""
closing = "Atentamente,"
