[shared]
to = "Departamento de Selección\nNTT DATA"

[es]
date = "17 de marzo de 2026"
subject = "Candidatura para el puesto de Desarrollador Frontend"
opening = "Estimado equipo de selección de NTT DATA:"
body = """
Me dirijo a vosotros para presentar mi candidatura como Desarrollador Frontend en NTT DATA. Como líder en facturación del sector tecnológico en España, sé que contáis con centros de excelencia técnica donde se valora el dominio del ecosistema completo de desarrollo web, y creo que mi perfil se ajusta a ese estándar.

En mi posición actual en EMAIS Grupo, trabajo con el stack completo del desarrollo frontend moderno: React, TypeScript, Styled-Components, Redux, Zustand, Storybook, Vitest y React Testing Library, dentro de un equipo de más de 7 desarrolladores con metodología Scrum y gestión en Jira. He diseñado e implementado múltiples módulos de negocio en producción, una librería de componentes UI documentada en Storybook, y he liderado la migración del sistema de testing de Jest a Vitest, mejorando las herramientas de productividad del equipo.

Mi experiencia previa en el CiTIUS (USC) complementa este perfil con la capacidad de trabajar de forma autónoma en proyectos complejos: como único frontend developer, diseñé la arquitectura completa de una aplicación React con integración REST API, MongoDB y edición colaborativa en tiempo real con WebSockets.

Sería un placer poder conversar sobre cómo mi experiencia puede aportar valor a vuestros equipos técnicos.
"""
closing = "Atentamente,"

[en]
date = "March 17, 2026"
subject = "Application for Frontend Developer Position"
opening = "Dear NTT DATA Hiring Team,"
body = """
I am writing to present my candidacy as a Frontend Developer at NTT DATA. As the leading IT company in Spain by revenue, I know you have centres of technical excellence where mastery of the complete web development ecosystem is valued, and I believe my profile meets that standard.

In my current position at EMAIS Grupo, I work with the full modern frontend development stack: React, TypeScript, Styled-Components, Redux, Zustand, Storybook, Vitest, and React Testing Library, within a 7+ developer team following Scrum methodology with Jira-based project management. I have designed and delivered multiple production business modules, a UI component library documented in Storybook, and driven the migration from Jest to Vitest, improving the team's productivity tooling.

My previous experience at CiTIUS (USC) complements this profile with the ability to work autonomously on complex projects: as the sole frontend developer, I designed the complete architecture of a React application with REST API integration, MongoDB, and real-time collaborative editing via WebSockets.

I would welcome the opportunity to discuss how my experience can bring value to your technical teams.
"""
closing = "Best regards,"
