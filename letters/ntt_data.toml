[shared]
to = "Departamento de Selección\nNTT DATA"

[es]
date = "6 de mayo de 2026"
subject = "Candidatura para el puesto de Desarrollador Frontend"
opening = "Estimado equipo de selección de NTT DATA:"
body = """
Os escribo para presentar mi candidatura como Desarrollador Frontend en NTT DATA. Vuestro tamaño y la variedad de proyectos —desde grandes cuentas hasta líneas de innovación— es lo que me atrae específicamente: busco un entorno cambiante y ritmo de consultoría tras unos años centrado en un único producto.

En EMAIS Grupo, dentro de un equipo de +7 desarrolladores con Scrum y code review obligatorio, trabajo en módulos de negocio en React y TypeScript, en una librería de componentes UI documentada en Storybook construida con UX/UI, y en el refactor progresivo de AngularJS a React con Zustand. También formo parte de un piloto interno de flujos de desarrollo asistidos por IA (Copilot, Claude, OpenCode) e ingeniería agéntica, algo que veo directamente relevante para una consultora del tamaño y ambición técnica de NTT DATA.

Antes, en el CiTIUS (Universidade de Santiago de Compostela), trabajé un año como único frontend developer en LexGal: definí desde cero la arquitectura React, el sistema de versionado con diff visual sobre documentos XML, la edición colaborativa en tiempo real con WebSockets, y la conversación directa con los investigadores para sacar requisitos. Esa combinación de autonomía técnica y trabajo en equipo grande es lo que creo que mejor encaja con vuestra forma de operar.

Estaré encantado de comentar cualquier detalle del perfil.
"""
closing = "Atentamente,"

[en]
date = "May 6, 2026"
subject = "Application for Frontend Developer Position"
opening = "Dear NTT DATA Hiring Team,"
body = """
I am writing to present my candidacy as a Frontend Developer at NTT DATA. Your size and project variety —from large accounts to innovation lines— is what specifically draws me: I am looking for a changing environment and consulting pace after a few years focused on a single product.

At EMAIS Grupo, within a 7+ developer team with Scrum and mandatory code review, I work on business modules in React and TypeScript, on a UI component library documented in Storybook built alongside UX/UI, and on the progressive refactoring of AngularJS to React with Zustand. I am also part of an internal pilot of AI-assisted development workflows (Copilot, Claude, OpenCode) and agentic engineering, which I see as directly relevant for a consultancy of NTT DATA's size and technical ambition.

Previously, at CiTIUS (University of Santiago de Compostela), I worked for a year as the sole frontend developer on LexGal: I defined from scratch the React architecture, the version control system with visual diff over XML documents, real-time collaborative editing via WebSockets, and direct conversation with researchers to define requirements. That combination of technical autonomy and large-team work is what I believe fits best with how you operate.

I would be happy to discuss any aspect of the profile.
"""
closing = "Best regards,"
