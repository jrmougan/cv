[shared]
to = "Departamento de Selección\nInetum"

[es]
date = "6 de mayo de 2026"
subject = "Candidatura para el puesto de Desarrollador Frontend"
opening = "Estimado equipo de selección de Inetum:"
body = """
Os escribo para presentar mi candidatura como Desarrollador Frontend en Inetum. Llego con +4 años en React y TypeScript, y un motivo concreto: busco un entorno de consultoría con más variedad de proyectos y un ritmo distinto al de un único producto largo.

Una parte importante de lo que hago en EMAIS Grupo se parece bastante al trabajo de consultoría: estamos refactorizando progresivamente módulos legacy de AngularJS+Redux a React con Zustand, equilibrando entrega de funcionalidad nueva, code review estricto y mantenibilidad del código antiguo dentro de un equipo de +7 desarrolladores con Scrum. Es modernización en frío, sin parar de servir negocio. Además, formo parte del piloto interno de flujos de desarrollo asistidos por IA (Copilot, Claude, OpenCode) e ingeniería agéntica, algo que me parece directamente trasladable a entornos de cliente.

Antes, en el CiTIUS (Universidade de Santiago de Compostela), trabajé un año como único frontend developer en LexGal: definí desde cero la arquitectura React, el sistema de versionado con diff visual sobre XML y la edición colaborativa con WebSockets. Esa combinación de modernización en equipo grande y autonomía total es lo que creo que mejor encaja con lo que pide trabajar en una consultora como Inetum.

Estaré encantado de comentar cualquier detalle del perfil.
"""
closing = "Atentamente,"

[en]
date = "May 6, 2026"
subject = "Application for Frontend Developer Position"
opening = "Dear Inetum Hiring Team,"
body = """
I am writing to present my candidacy as a Frontend Developer at Inetum. I come with 4+ years in React and TypeScript and a specific reason: I am looking for a consulting environment with more project variety and a different pace from being focused on a single long-running product.

A meaningful part of my work at EMAIS Grupo resembles consulting fairly closely: we are progressively refactoring legacy AngularJS+Redux modules to React with Zustand, balancing new feature delivery, strict code review, and maintainability of the old code within a 7+ developer team following Scrum. It is modernisation in flight, without ever stopping to serve the business. I am also part of the internal pilot of AI-assisted development workflows (Copilot, Claude, OpenCode) and agentic engineering, which I believe translates directly to client environments.

Previously, at CiTIUS (University of Santiago de Compostela), I worked for a year as the sole frontend developer on LexGal: I defined from scratch the React architecture, the version control system with visual diff over XML, and real-time collaborative editing via WebSockets. That combination of large-team modernisation and full autonomy is what I think best matches the work of a consultancy like Inetum.

I would be happy to discuss any aspect of the profile.
"""
closing = "Best regards,"
