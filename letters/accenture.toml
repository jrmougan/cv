[shared]
to = "Departamento de Selección\nAccenture Song"

[es]
date = "6 de mayo de 2026"
subject = "Candidatura para el puesto de Desarrollador Frontend"
opening = "Estimado equipo de selección de Accenture Song:"
body = """
Me pongo en contacto con vosotros para presentar mi candidatura como Desarrollador Frontend en Accenture Song. Antes de dedicarme profesionalmente al desarrollo, me formé como Graduado en Enseñanzas Artísticas Superiores de Música en el Conservatorio Superior de A Coruña: años de instrumento, ensayo en grupo y disciplina de detalle. Esa formación me dio las bases —rigor, sensibilidad por la forma, capacidad de trabajar bajo presión en equipo— que aplico todos los días al frontend, donde la diferencia entre algo correcto y algo cuidado suele estar en el último 10%.

En EMAIS Grupo, dentro de un equipo de +7 desarrolladores con Scrum y code review obligatorio, he diseñado módulos de negocio en producción y una librería de componentes UI documentada en Storybook pensada para mantener consistencia visual entre módulos. También impulsé la migración del sistema de testing a Vitest, instalando una práctica de calidad sostenible en el equipo. Antes, en el CiTIUS (USC), construí desde cero LexGal como único frontend developer: arquitectura React, sistema de versionado con diff visual sobre documentos XML y edición colaborativa en tiempo real con WebSockets.

La combinación de creatividad y rigor que veo en Accenture Song es justamente la cultura en la que creo que mi perfil —técnico y formado en otra disciplina del oficio— encaja mejor. Estaré encantado de comentar cualquier detalle.
"""
closing = "Atentamente,"

[en]
date = "May 6, 2026"
subject = "Application for Frontend Developer Position"
opening = "Dear Accenture Song Hiring Team,"
body = """
I am writing to present my candidacy as a Frontend Developer at Accenture Song. Before dedicating myself professionally to development, I obtained a Higher Degree in Music from the Conservatorio Superior de A Coruña: years of instrument practice, ensemble work, and detail-driven discipline. That training gave me the foundation —rigour, sensitivity to form, the ability to work under pressure in a team— that I apply daily to frontend, where the difference between something correct and something polished tends to live in the last 10%.

At EMAIS Grupo, within a 7+ developer team following Scrum with mandatory code review, I have designed production business modules and a UI component library documented in Storybook, intended to keep visual consistency across modules. I also drove the migration of the testing system to Vitest, installing a sustainable quality practice in the team. Previously, at CiTIUS (USC), I built LexGal from scratch as the sole frontend developer: React architecture, a version control system with visual diff over XML documents, and real-time collaborative editing via WebSockets.

The combination of creativity and rigour I see in Accenture Song is precisely the culture I believe my profile —technical, with formal training in another craft— fits best. I would be happy to discuss any details.
"""
closing = "Best regards,"
