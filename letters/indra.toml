[shared]
to = "Departamento de Selección\nIndra / Minsait"

[es]
date = "6 de mayo de 2026"
subject = "Candidatura para el puesto de Desarrollador Senior Frontend"
opening = "Estimado equipo de selección de Minsait:"
body = """
Me dirijo a ustedes con el fin de postular al puesto de Desarrollador/a Senior Frontend React/Angular.

Cuento con más de cuatro años de experiencia en React y TypeScript, y me atrae especialmente incorporarme a Minsait por la variedad de dominios y clientes con los que trabajan sus equipos de Soluciones, un contexto donde adaptarse rápido y aportar valor desde el primer sprint forma parte del trabajo.

Actualmente, en EMAIS Grupo, formo parte de un equipo de más de siete desarrolladores que combina, bajo Scrum, la entrega continua de funcionalidad nueva con la migración progresiva de módulos legacy de AngularJS + Redux a React con Zustand. El día a día implica componentes funcionales con los últimos hooks, TypeScript/TSX, code review estricto y decisiones de arquitectura pragmáticas para modernizar sin detener el negocio: el mismo equilibrio que requieren los proyectos de cliente que no pueden permitirse una parada. Además, participo en el piloto interno de desarrollo asistido por IA (Copilot, Claude, OpenCode) e ingeniería agéntica, una práctica que veo directamente trasladable al objetivo que marca la oferta de "agilizar el desarrollo con herramientas de IA".

Antes, durante un año en el CiTIUS (Universidade de Santiago de Compostela), fui el único frontend del proyecto LexGal: definí desde cero la arquitectura React, el sistema de versionado con diff visual sobre JSON parseado sobre un original XML y la edición colaborativa por WebSockets, además de comunicarme directamente con los responsables del proyecto para refinar requisitos (reuniones conjuntas con los responsables de proyecto, investigadores y funcionarios públicos del proyecto LexGal). Esa etapa me dio autonomía técnica de extremo a extremo y experiencia real en interlocución con cliente, ambas cosas presentes en la descripción del puesto.

Quedo a su disposición para ampliar cualquier detalle del perfil en una entrevista.
"""
closing = "Un cordial saludo,"
