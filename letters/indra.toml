[shared]
to = "Departamento de Selección\nIndra / Minsait"

[es]
date = "6 de mayo de 2026"
subject = "Candidatura para el puesto de Desarrollador Senior Frontend"
opening = "Estimado equipo de selección de Minsait:"
body = """
Me dirijo a vosotros para presentar mi candidatura como Desarrollador Senior Frontend en Minsait. Llevo más de cuatro años desarrollando con React, TypeScript y JavaScript, y vuestra oferta encaja con lo que estoy buscando ahora mismo: un entorno de consultoría con proyectos variados y un ritmo dinámico, dentro de un equipo donde pueda seguir creciendo en el stack frontend moderno y, a medio plazo, hacia un perfil fullstack.

Actualmente, en EMAIS Grupo, desarrollo módulos de negocio en producción con React, TypeScript, Styled-Components y formularios dinámicos (RJSF/JSONSchema), dentro de un equipo de +7 desarrolladores con Scrum y code review obligatorio. He colaborado en la creación de una librería de componentes UI reutilizables documentada en Storybook —trabajando estrechamente con UX/UI—, en el refactor progresivo de módulos legacy AngularJS+Redux a React con Zustand, y en la migración del framework de testing de Jest a Vitest junto con React Testing Library.

Antes, en el CiTIUS (Universidade de Santiago de Compostela), trabajé como único frontend developer en el proyecto LexGal: definí desde cero la arquitectura de componentes React, los flujos de usuario, un sistema completo de control de versiones y diff visual sobre documentos XML, y edición colaborativa en tiempo real mediante WebSockets (STOMP/SockJS) integrado con una API REST SpringBoot.

Encajo con vuestros requisitos en componentes funcionales con hooks, TypeScript/TSX, Redux/Zustand, calidad de código (ESLint, Prettier), Git/Gitflow, testing front-end y buenas prácticas (SOLID, KISS, DRY); y me interesa además profundizar en SSR con Next.js, PWA y rendimiento. Quedo a vuestra disposición para profundizar en cualquier aspecto de mi perfil.
"""
closing = "Atentamente,"
