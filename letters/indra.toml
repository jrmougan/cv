[shared]
to = "Departamento de Selección\nIndra / Minsait"

[es]
date = "6 de mayo de 2026"
subject = "Candidatura para el puesto de Desarrollador Senior Frontend"
opening = "Estimado equipo de selección de Minsait:"
body = """
Llevo más de cuatro años construyendo soluciones web en producción con React y TypeScript —desde una librería de componentes en un equipo Scrum de +7 personas hasta una aplicación completa como único frontend en un proyecto de investigación—, y vuestra vacante de Desarrollador Senior Frontend en Minsait encaja con lo que busco ahora mismo: un entorno de consultoría con proyectos variados, ritmo dinámico y un equipo donde seguir creciendo en el stack frontend moderno y, a medio plazo, hacia un perfil fullstack.

Actualmente, en EMAIS Grupo, desarrollo módulos de negocio en producción con React, TypeScript, Styled-Components, Fluent UI y formularios dinámicos (RJSF/JSONSchema), dentro de un equipo de +7 desarrolladores con Scrum y code review obligatorio. He participado en la creación de una librería de componentes UI reutilizables documentada en Storybook —en colaboración estrecha con UX/UI—, en la migración del framework de testing de Jest a Vitest con React Testing Library, y en el refactor progresivo de módulos legacy AngularJS+Redux a React con Zustand.

Antes, en el CiTIUS (Universidade de Santiago de Compostela), trabajé como único frontend developer en el proyecto LexGal: arquitectura de componentes React desde cero, flujos de usuario, sistema completo de control de versiones y diff visual sobre documentos XML, y edición colaborativa en tiempo real mediante WebSockets (STOMP/SockJS) integrado con una API REST SpringBoot. La definición de requisitos era directa con los investigadores del centro, con autonomía técnica desde el diseño hasta la entrega.

En el día a día trabajo con componentes funcionales y hooks, TypeScript/TSX, Redux y Zustand, CSS responsive mobile-first, testing front-end (Vitest, RTL), calidad de código (ESLint, Prettier, Sonar) y CI con GitHub Actions, aplicando Gitflow y principios SOLID, KISS y DRY. Coordino con backend y Project Managers la definición de requisitos y los contratos de API, y redacto la documentación técnica del trabajo entregado. Las herramientas de IA forman parte de mi flujo diario (Copilot, Claude, OpenCode) y en EMAIS estamos experimentando con flujos de ingeniería agéntica. Me interesa además profundizar en Next.js/SSR, PWA y rendimiento. Estaré encantado de comentar cualquier detalle del perfil.
"""
closing = "Atentamente,"
