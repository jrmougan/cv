[shared]
to = "Departamento de Selección\nIndra / Minsait"

[es]
date = "6 de mayo de 2026"
subject = "Candidatura para el puesto de Desarrollador Senior Frontend"
opening = "Estimado equipo de selección de Minsait:"
body = """
Me pongo en contacto con vosotros para presentar mi candidatura como Desarrollador Senior Frontend en Minsait. Llevo +4 años haciendo frontend con React y TypeScript en producción, y un motivo concreto me trae aquí: busco un entorno de consultoría con proyectos variados y ritmo dinámico, después de unos años centrado en un único producto.

Lo que me hace mirar específicamente vuestra oferta es que mencionáis explícitamente el uso de herramientas de IA como Copilot. En EMAIS Grupo, además del trabajo de producto dentro de un equipo de +7 desarrolladores con Scrum y code review obligatorio, formo parte de un piloto interno bastante real: estamos integrando flujos de desarrollo asistidos por IA en el día a día —Copilot, Claude, OpenCode— y experimentando con ingeniería agéntica en tareas de desarrollo, refactor y revisión. Es un terreno en el que ya estoy invirtiendo tiempo, no algo que tenga que aprender de cero al llegar.

Antes, en el CiTIUS (Universidade de Santiago de Compostela), trabajé un año como único frontend developer en LexGal: arquitectura React desde cero, sistema de versionado con diff visual sobre documentos XML, edición colaborativa en tiempo real con WebSockets, y comunicación directa con los investigadores del centro para sacar requisitos. Esa autonomía técnica desde la decisión arquitectónica hasta la entrega es algo que quiero seguir aplicando, ahora en un contexto de consultoría.

Estaré encantado de comentar cualquier detalle del perfil.
"""
closing = "Atentamente,"
