[shared]
to = "Departamento de Selección\nGFT Technologies"

[es]
date = "6 de mayo de 2026"
subject = "Candidatura para el puesto de Desarrollador Senior Frontend"
opening = "Estimado equipo de selección de GFT:"
body = """
Me dirijo a ustedes con el fin de postular al puesto de Desarrollador Senior Frontend en GFT.

Cuento con más de cuatro años de experiencia en React y TypeScript, y me atrae especialmente incorporarme a GFT por su apuesta por la ingeniería de producto seria —arquitectura, calidad y decisiones técnicas defendibles— en proyectos de cliente, especialmente en el sector financiero, donde lo construido tiene que sostenerse en el tiempo.

Actualmente, en EMAIS Grupo, formo parte de un equipo de más de siete desarrolladores que combina, bajo Scrum, la entrega continua de funcionalidad nueva con la migración progresiva de módulos legacy de AngularJS + Redux a React con Zustand. El día a día implica componentes funcionales con los últimos hooks, TypeScript/TSX, code review estricto y decisiones de arquitectura pragmáticas para modernizar sin detener el negocio: el mismo equilibrio que requieren los proyectos de cliente que no pueden permitirse una parada. Además, participo en el piloto interno de desarrollo asistido por IA (Copilot, Claude, OpenCode) e ingeniería agéntica.

Antes, durante un año en el CiTIUS (Universidade de Santiago de Compostela), fui el único frontend del proyecto LexGal: definí desde cero la arquitectura React, el sistema de versionado con diff visual sobre JSON parseado sobre un original XML y la edición colaborativa por WebSockets, además de comunicarme directamente con los responsables del proyecto para refinar requisitos (reuniones conjuntas con los responsables de proyecto, investigadores y funcionarios públicos del proyecto LexGal). En esa etapa cada decisión técnica era mía y tenía que sostenerla, también en las conversaciones con quien iba a usar la herramienta — el tipo de responsabilidad que valora un puesto en GFT.

Quedo a su disposición para ampliar cualquier detalle del perfil en una entrevista.
"""
closing = "Un cordial saludo,"

[en]
date = "May 6, 2026"
subject = "Application for Senior Frontend Developer Position"
opening = "Dear GFT Hiring Team,"
body = """
I am writing to apply for the Senior Frontend Developer position at GFT.

I have more than four years of experience in React and TypeScript, and I am particularly drawn to GFT by your commitment to serious product engineering —architecture, quality, and defensible technical decisions— in client projects, especially in the financial sector, where what is built has to stand the test of time.

Currently, at EMAIS Grupo, I am part of a team of more than seven developers that combines, under Scrum, continuous delivery of new functionality with the progressive migration of legacy AngularJS + Redux modules to React with Zustand. Day-to-day involves functional components with the latest hooks, TypeScript/TSX, strict code review, and pragmatic architectural decisions to modernise without stopping the business: the same balance required by client projects that cannot afford a pause. I also take part in the internal pilot of AI-assisted development (Copilot, Claude, OpenCode) and agentic engineering.

Previously, for a year at CiTIUS (University of Santiago de Compostela), I was the sole frontend developer on the LexGal project: I defined from scratch the React architecture, the version control system with visual diff over JSON parsed from an XML original, and real-time collaborative editing via WebSockets, in addition to communicating directly with the project leads to refine requirements (joint meetings with project leads, researchers, and public officials of the LexGal project). At that stage every technical decision was mine and I had to sustain it, including in the conversations with whoever would use the tool — the kind of responsibility a role at GFT values.

I remain at your disposal to expand on any detail of the profile in an interview.
"""
closing = "Best regards,"
