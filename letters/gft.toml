[shared]
to = "Departamento de Selección\nGFT Technologies"

[es]
date = "6 de mayo de 2026"
subject = "Candidatura para el puesto de Desarrollador Frontend"
opening = "Estimado equipo de selección de GFT:"
body = """
Me dirijo a vosotros para presentar mi candidatura como Desarrollador Frontend en GFT. Lo que más me atrae es vuestra apuesta por ingeniería de producto seria —arquitectura, calidad, decisiones técnicas defendibles—, y es precisamente donde creo que mi experiencia puede aportar.

En el CiTIUS (Universidade de Santiago de Compostela) trabajé un año como único frontend developer en el proyecto LexGal: una herramienta de gestión normativa donde definí desde cero todo el frontend. Arquitectura de componentes React, flujos de usuario, un sistema completo de control de versiones con diff visual sobre documentos XML, y edición colaborativa en tiempo real con WebSockets sobre una API REST SpringBoot. Cada decisión técnica era mía y tenía que defenderla, también en las conversaciones con los investigadores que iban a usar la herramienta. La responsabilidad de construir un producto coherente desde la primera línea es algo que quiero seguir aplicando.

Actualmente, en EMAIS Grupo, complemento ese perfil con la experiencia opuesta: equipo de +7 desarrolladores con Scrum y code review obligatorio, una librería de componentes UI documentada en Storybook construida con UX/UI, y refactor progresivo de módulos legacy AngularJS a React. Combinar ambos lados —decidir arquitectura cuando soy yo solo y cuando soy uno más en un equipo grande— es lo que me parece más interesante de un puesto en GFT.

Estaré encantado de comentar cualquier detalle del perfil.
"""
closing = "Atentamente,"

[en]
date = "May 6, 2026"
subject = "Application for Frontend Developer Position"
opening = "Dear GFT Hiring Team,"
body = """
I am writing to present my candidacy as a Frontend Developer at GFT. What attracts me most is GFT's commitment to serious product engineering —architecture, quality, defensible technical decisions— and that is precisely where I believe my experience contributes.

At CiTIUS (University of Santiago de Compostela) I worked for a year as the sole frontend developer on the LexGal project: a regulatory management tool where I defined the entire frontend from scratch. React component architecture, user flows, a complete version control system with visual diff over XML documents, and real-time collaborative editing via WebSockets on a SpringBoot REST API. Every technical decision was mine and I had to defend it, including in the conversations with the researchers who were going to use the tool. The responsibility of building a coherent product from the first line is something I want to keep applying.

Currently, at EMAIS Grupo, I complement that profile with the opposite experience: a 7+ developer team with Scrum and mandatory code review, a UI component library documented in Storybook built alongside UX/UI, and progressive refactoring of legacy AngularJS modules to React. Combining both sides —deciding architecture when I am alone and when I am one of many in a large team— is what I find most interesting about a position at GFT.

I would be happy to discuss any aspect of the profile.
"""
closing = "Best regards,"
